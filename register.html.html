<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun CropRotate</title>

<style>
:root{
    --primary:#2E7D32;
    --primary-light:#4CAF50;
    --bg-light:#F1F8E9;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(46,125,50,0.75),rgba(46,125,50,0.75)),
    url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?w=1200');
    background-size:cover;
    background-position:center;
}

.register-box{
    width:420px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
}

h2{
    text-align:center;
    color:var(--primary);
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:600;
}

input,select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
}

input:focus,select:focus{
    outline:none;
    border-color:var(--primary);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--primary);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:var(--primary-light);
}

.back-link{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:var(--primary);
    font-weight:bold;
}

.back-link:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="register-box">

    <div class="logo">🌱</div>

    <h2>Daftar Akun CropRotate</h2>

    <form onsubmit="daftar(event)">

        <label>Nama Lengkap</label>
        <input type="text" required>

        <label>Email</label>
        <input type="email" required>

        <label>Password</label>
        <input type="password" required>

        <label>Peran</label>
        <select>
            <option>Petani</option>
            <option>Mahasiswa</option>
            <option>Penyuluh</option>
            <option>Peneliti</option>
        </select>

        <button type="submit">Daftar Sekarang</button>

    </form>

    <a href="croprotate josjis.html" class="back-link">
        ← Kembali ke Login
    </a>

</div>

<script>
function daftar(e){
    e.preventDefault();
    alert("Pendaftaran berhasil! Silakan login.");
    window.location.href="croprotate josjis.html";
}
</script>

</body>
</html>
